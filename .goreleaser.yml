# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: go-branchy

force_token: github

before:
  hooks:
    - go mod verify

builds:
  - binary: "{{ .ProjectName }}"
    main: ./cmd/go-branchy
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - arm64
      - amd64
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/untcha/go-branchy/internal/appmeta.Version={{.Version}}
      - -X github.com/untcha/go-branchy/internal/appmeta.Commit={{.Commit}}
      - -X github.com/untcha/go-branchy/internal/appmeta.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      # - "^docs:"
      # - "^test:"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: Dependency updates
      regexp: '^(build|chore|feat|fix|refactor)(\s+\S+)?(\(deps\))?!?:.+$'
      order: 50
    - title: "New Features"
      regexp: '^feat(\s+\S+)?(\([^)]+\))?!?:.+$'
      order: 100
    # - title: "Security updates"
    #   regexp: '^.*?sec(\([[:word:]]+\))??!?:.+$'
    #   order: 150
    - title: "Bug fixes"
      regexp: '^fix(\s+\S+)?(\([^)]+\))?!?:.+$'
      order: 200
    - title: Refactoring
      regexp: '^refactor(\s+\S+)?(\([^)]+\))?!?:.+$'
      order: 300
    - title: "Documentation updates"
      regexp: '^docs(\s+\S+)?(\([^)]+\))?!?:.+$'
      order: 400
    - title: "Build process updates"
      regexp: '^build(\s+\S+)?(\([^)]+\))?!?:.+$'
      order: 400
    - title: Maintenance work
      regexp: '^(chore|deprecate|test)(\s+\S+)?(\([^)]+\))?!?:.+$'
      order: 500
    # chore, refactor, test
    - title: Other work
      order: 9999

release:
  footer: |
    **Full Changelog**: https://github.com/untcha/go-branchy/compare/{{ .PreviousTag }}...{{ .Tag }}

